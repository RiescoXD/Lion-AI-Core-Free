apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: lion-json-server-riesco-v1
  annotations:
    scenarios.ai.sap.com/name: "Lion Smoke Pipe"
    scenarios.ai.sap.com/description: "Validacion minima de tuberia ServingTemplate a Deployment a Endpoint"
    executables.ai.sap.com/name: "JSON Endpoint"
    executables.ai.sap.com/description: "Servidor HTTP minimo que responde JSON hardcodeado"
  labels:
    scenarios.ai.sap.com/id: "lion-smoke-pipe"
    ai.sap.com/version: "1.0.0"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/metric: concurrency
        autoscaling.knative.dev/target: 1
        autoscaling.knative.dev/targetBurstCapacity: 0
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11-slim
          ports:
            - containerPort: 9001
              protocol: TCP
          command:
            - /bin/sh
            - -c
          args:
            - |
              cat > /tmp/server.py <<'PY'
              from http.server import BaseHTTPRequestHandler, HTTPServer
              import json
              import time

              class Handler(BaseHTTPRequestHandler):
                  def send_json(self, payload, status=200):
                      body = json.dumps(payload, ensure_ascii=False).encode("utf-8")
                      self.send_response(status)
                      self.send_header("Content-Type", "application/json; charset=utf-8")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)

                  def do_GET(self):
                      self.send_json({
                          "status": "ok",
                          "type": "smoke-test",
                          "runtime": "SAP AI Core",
                          "message": "La tuberia ServingTemplate -> Deployment -> Endpoint responde correctamente",
                          "method": "GET",
                          "path": self.path,
                          "timestamp": int(time.time())
                      })

                  def do_POST(self):
                      length = int(self.headers.get("Content-Length", "0"))
                      raw = self.rfile.read(length).decode("utf-8") if length > 0 else ""

                      try:
                          received = json.loads(raw) if raw else None
                      except Exception:
                          received = raw

                      self.send_json({
                          "status": "ok",
                          "type": "smoke-test",
                          "runtime": "SAP AI Core",
                          "message": "POST recibido correctamente",
                          "method": "POST",
                          "path": self.path,
                          "received": received,
                          "timestamp": int(time.time())
                      })

                  def log_message(self, format, *args):
                      print("%s - - [%s] %s" % (
                          self.client_address[0],
                          self.log_date_time_string(),
                          format % args
                      ), flush=True)

              print("Starting JSON smoke endpoint on port 9001", flush=True)
              HTTPServer(("0.0.0.0", 9001), Handler).serve_forever()
              PY

              python /tmp/server.py
