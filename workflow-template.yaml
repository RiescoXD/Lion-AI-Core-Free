apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: lion-json-endpoint
  annotations:
    scenarios.ai.sap.com/name: "Lion JSON Endpoint"
    scenarios.ai.sap.com/description: "Endpoint mínimo de prueba que devuelve JSON hardcodeado"
    executables.ai.sap.com/name: "JSON Test Server"
    executables.ai.sap.com/description: "Servidor HTTP mínimo para probar deployment en SAP AI Core"
  labels:
    scenarios.ai.sap.com/id: "lion-json-endpoint"
    executables.ai.sap.com/id: "lion-json-endpoint"
    ai.sap.com/version: "1.0.0"
spec:
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/metric: concurrency
        autoscaling.knative.dev/target: 1
        autoscaling.knative.dev/targetBurstCapacity: 0
      labels: |
        ai.sap.com/resourcePlan: starter
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: python:3.11-slim
          ports:
            - containerPort: 8080
              protocol: TCP
          command:
            - python
            - -c
          args:
            - |
              from http.server import BaseHTTPRequestHandler, HTTPServer
              import json
              import time

              class Handler(BaseHTTPRequestHandler):
                  def _send_json(self, payload, status=200):
                      body = json.dumps(payload).encode("utf-8")
                      self.send_response(status)
                      self.send_header("Content-Type", "application/json")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)

                  def do_GET(self):
                      self._send_json({
                          "status": "ok",
                          "source": "SAP AI Core",
                          "message": "Endpoint JSON hardcodeado funcionando",
                          "path": self.path,
                          "timestamp": int(time.time())
                      })

                  def do_POST(self):
                      length = int(self.headers.get("Content-Length", 0))
                      raw_body = self.rfile.read(length).decode("utf-8") if length > 0 else ""
                      self._send_json({
                          "status": "ok",
                          "source": "SAP AI Core",
                          "message": "POST recibido correctamente",
                          "receivedBody": raw_body,
                          "timestamp": int(time.time())
                      })

              server = HTTPServer(("0.0.0.0", 8080), Handler)
              print("Servidor JSON escuchando en puerto 8080", flush=True)
              server.serve_forever()
